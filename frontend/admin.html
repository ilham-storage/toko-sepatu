<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — SepatuKu</title>
  <link href="https://fonts.google.com/share?selection.family=Oswald:wght@200..700" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-inner">
      <a class="navbar-logo" href="index.html">👟 SepatuKu</a>
      <div class="navbar-menu">
        <a href="index.html">Toko</a>
        <a href="admin.html" style="color:var(--primary); font-weight:600">Admin</a>
        <a href="admin-orders.html">📦 Pesanan</a>
      </div>
      <div class="navbar-right">
        <span id="nav-username"></span>
        <button class="btn-logout" onclick="logout()">Logout</button>
      </div>
    </div>
  </nav>

  <div class="container">
    <h2 class="page-title">Dashboard Admin</h2>
    <p class="page-sub">Kelola semua produk sepatu!</p>

    <!-- Form Tambah / Edit Produk -->
    <div class="form-card">
      <h3 id="formTitle">➕ Tambah Produk Baru</h3>

      <div class="form-grid">
        <div class="field">
          <label>Nama Produk</label>
          <input id="f-nama" class="input" type="text" placeholder="Nama sepatu..." />
        </div>

        <div class="field">
          <label>Kategori</label>
          <select id="f-kategori" class="input">
            <option value="sneakers">Sneakers</option>
            <option value="casual">Casual</option>
            <option value="boots">Boots</option>
            <option value="sandal">Sandal</option>
          </select>
        </div>

        <div class="field">
          <label>Harga (Rp)</label>
          <input id="f-harga" class="input" type="number" placeholder="Contoh: 500000" />
        </div>

        <div class="field">
          <label>Stok</label>
          <input id="f-stok" class="input" type="number" placeholder="Contoh: 10" />
        </div>

        <div class="field">
          <label>Deskripsi</label>
          <input id="f-deskripsi" class="input" type="text" placeholder="Deskripsi produk..." />
        </div>
      </div>

        <div class="field">
          <label>Gambar Produk</label>
          <input id="f-gambar" class="input" type="file" accept="image/*" />
          <small style="color:var(--text-muted); font-size:0.75rem; margin-top:4px; display:block;">
              FOrmat: JPG, PNG, WEBP. Maksimal 2MB
          </small>
        </div>

      <input id="f-id" type="hidden" value="" />

      <div style="display:flex; gap:10px; margin-top:20px;">
        <button class="btn-primary" onclick="simpanProduk()">💾 Simpan</button>
        <button class="btn-secondary" onclick="resetForm()">✕ Reset</button>
      </div>

      <p id="message" style="margin-top:12px;"></p>
    </div>

    <!-- Tabel Produk -->
    <div style="overflow-x:auto;">
      <table class="admin-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nama</th>
            <th>Kategori</th>
            <th>Harga</th>
            <th>Stok</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="produkTable"></tbody>
      </table>
    </div>

  </div>

  <!-- Toast -->
  <div id="toast" style="display:none"></div>

  <script>
    const API   = "http://localhost:3000";
    const token = localStorage.getItem("token");
    const user  = JSON.parse(localStorage.getItem("user"));

    // Cek token & role admin
    if (!token) window.location.href = "login.html";
    if (user && user.role !== "admin") window.location.href = "index.html";

    // Tampilkan nama
    document.getElementById("nav-username").innerText = user ? "👑 " + user.nama : "";

    // ── Format Harga ──
    function formatHarga(harga) {
      return "Rp " + harga.toLocaleString("id-ID");
    }

    // ── Get Semua Produk ──
    async function getProduk() {
      try {
        const res  = await fetch(API + "/produk");
        const data = await res.json();

        const tbody = document.getElementById("produkTable");
        tbody.innerHTML = "";

        data.forEach(produk => {
          tbody.innerHTML += `
            <tr>
              <td>#${produk.id}</td>
              <td><strong>${produk.nama}</strong></td>
              <td>${produk.kategori}</td>
              <td>${formatHarga(produk.harga)}</td>
              <td>${produk.stok} pasang</td>
              <td>
                <div style="display:flex; gap:6px;">
                  <button class="btn-secondary"
                    style="padding:6px 12px; font-size:0.78rem;"
                    onclick="editProduk(${produk.id}, '${produk.nama}', '${produk.kategori}', ${produk.harga}, ${produk.stok}, '${produk.deskripsi}')">
                    ✏️ Edit
                  </button>
                  <button class="btn-danger"
                    onclick="hapusProduk(${produk.id})">
                    🗑️ Hapus
                  </button>
                </div>
              </td>
            </tr>`;
        });

      } catch (err) {
        showToast("Gagal memuat produk!", "error");
      }
    }

    // ── Simpan Produk (Tambah / Edit) ──
    async function simpanProduk() {
      const id        = document.getElementById("f-id").value;
      const nama      = document.getElementById("f-nama").value;
      const kategori  = document.getElementById("f-kategori").value;
      const harga     = document.getElementById("f-harga").value;
      const stok      = document.getElementById("f-stok").value;
      const deskripsi = document.getElementById("f-deskripsi").value;
      const gambar    = document.getElementById("f-gambar").files[0];

      if (!nama || !harga || !stok) {
        document.getElementById("message").innerText = "Nama, harga, stok wajib diisi!";
        return;
      }

      try {
        //Pakai FormData karena ada file!
        const formData = new FormData();;
        formData.append("nama",     nama);
        formData.append("kategori", kategori);
        formData.append("harga",    harga);
        formData.append("stok",     stok);
        formData.append("deskripsi", deskripsi);
        
        //Hanya append gambar kalau ada file Baru
        if (gambar) formData.append("gambar", gambar);


        // Kalau ada id → edit, kalau tidak → tambah
        const url    = id ? API + "/produk/" + id : API + "/produk";
        const method = id ? "PUT" : "POST";

        const res = await fetch(url, {
          method,
          headers: {
            Authorization: "Bearer " + token
          },
          body: formData
        });

        const data = await res.json();

        if (res.ok) {
          showToast(data.message, "success");
          resetForm();
          getProduk();
        } else {
          document.getElementById("message").innerText = data.message;
        }

      } catch (err) {
        showToast("Server error!", "error");
      }
    }

    // ── Edit Produk → Isi Form ──
    function editProduk(id, nama, kategori, harga, stok, deskripsi) {
      document.getElementById("f-id").value        = id;
      document.getElementById("f-nama").value      = nama;
      document.getElementById("f-kategori").value  = kategori;
      document.getElementById("f-harga").value     = harga;
      document.getElementById("f-stok").value      = stok;
      document.getElementById("f-deskripsi").value = deskripsi;
      document.getElementById("formTitle").innerText = "✏️ Edit Produk #" + id;

      // Scroll ke form
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    // ── Hapus Produk ──
    async function hapusProduk(id) {
      if (!confirm("Yakin mau hapus produk ini?")) return;

      try {
        const res = await fetch(API + "/produk/" + id, {
          method: "DELETE",
          headers: { Authorization: "Bearer " + token }
        });

        const data = await res.json();

        if (res.ok) {
          showToast("Produk berhasil dihapus!", "success");
          getProduk();
        } else {
          showToast(data.message, "error");
        }

      } catch (err) {
        showToast("Server error!", "error");
      }
    }

    // ── Reset Form ──
    function resetForm() {
      document.getElementById("f-id").value        = "";
      document.getElementById("f-nama").value      = "";
      document.getElementById("f-harga").value     = "";
      document.getElementById("f-stok").value      = "";
      document.getElementById("f-deskripsi").value = "";
      document.getElementById("f-kategori").value  = "sneakers";
      document.getElementById("formTitle").innerText = "➕ Tambah Produk Baru";
      document.getElementById("message").innerText   = "";
    }

    // ── Toast ──
    function showToast(message, type = "") {
      const toast = document.getElementById("toast");
      toast.innerText     = message;
      toast.className     = "toast " + type;
      toast.style.display = "block";
      setTimeout(() => { toast.style.display = "none"; }, 3000);
    }

    // ── Logout ──
    function logout() {
      localStorage.removeItem("token");
      localStorage.removeItem("user");
      window.location.href = "login.html";
    }

    getProduk();
  </script>

</body>
</html>
