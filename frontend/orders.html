<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pesanan Saya — SepatuKu</title>
  <link href="https://fonts.google.com/share?selection.family=Oswald:wght@200..700" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-inner">
      <a class="navbar-logo" href="index.html">👟 SepatuKu</a>
      <div class="navbar-menu">
        <a href="index.html">Produk</a>
        <a href="orders.html">Pesanan Saya</a>
      </div>
      <div class="navbar-right">
        <span id="nav-username"></span>
        <a class="btn-cart" href="cart.html">🛒 Cart</a>
        <button class="btn-logout" onclick="logout()">Logout</button>
      </div>
    </div>
  </nav>

  <!-- Main -->
  <div class="container">
    <h2 class="page-title">Pesanan Saya</h2>
    <p class="page-sub">Riwayat semua pesananmu!</p>

    <div id="orderList"></div>
  </div>

  <!-- Modal Detail Order -->
  <div id="modal" style="
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.5);
    z-index:200;
    justify-content:center;
    align-items:center;
  ">
    <div style="
      background:white;
      border-radius:20px;
      padding:32px;
      width:90%;
      max-width:500px;
      max-height:80vh;
      overflow-y:auto;
      position:relative;
    ">
      <button onclick="tutupModal()" style="
        position:absolute;
        top:16px; right:16px;
        background:none;
        border:none;
        font-size:1.5rem;
        cursor:pointer;
        color:#6b7280;
      ">✕</button>

      <div id="modalContent"></div>
    </div>
  </div>

  <script>
    const API   = "http://localhost:5000";
    const token = localStorage.getItem("token");
    const user  = JSON.parse(localStorage.getItem("user"));

    // Cek token
    if (!token) window.location.href = "login.html";

    // Tampilkan nama user
    document.getElementById("nav-username").innerText = user ? "Halo, " + user.nama + "!" : "";

    // ── Format Harga ──
    function formatHarga(harga) {
      return "Rp " + harga.toLocaleString("id-ID");
    }

    // ── Format Tanggal ──
    function formatTanggal(tanggal) {
      return new Date(tanggal).toLocaleDateString("id-ID", {
        day:   "numeric",
        month: "long",
        year:  "numeric",
        hour:  "2-digit",
        minute:"2-digit"
      });
    }

    // ── Get Semua Order ──
    async function getOrders() {
      try {
        const res  = await fetch(API + "/order", {
          headers: { Authorization: "Bearer " + token }
        });
        const data = await res.json();

        const orderList = document.getElementById("orderList");

        if (data.length === 0) {
          orderList.innerHTML = `
            <div class="empty-state">
              <div class="icon">📦</div>
              <p>Belum ada pesanan!</p>
              <a href="index.html" class="btn-primary">Mulai Belanja</a>
            </div>`;
          return;
        }

        orderList.innerHTML = "";
        data.forEach(order => {
          orderList.innerHTML += `
            <div class="order-card">
              <div class="order-header">
                <div>
                  <div class="order-id">Order #${order.id}</div>
                  <div class="order-date">${formatTanggal(order.created_at)}</div>
                </div>
                <span class="order-status status-${order.status}">
                  ${order.status}
                </span>
              </div>

              <div style="display:flex; justify-content:space-between; align-items:center;">
                <div class="order-total">${formatHarga(order.total)}</div>
                <button class="btn-secondary" onclick="lihatDetail(${order.id})">
                  Lihat Detail
                </button>
              </div>
            </div>`;
        });

      } catch (err) {
        document.getElementById("orderList").innerHTML =
          "<p style='color:var(--danger)'>Gagal memuat pesanan!</p>";
      }
    }

    // ── Lihat Detail Order ──
    async function lihatDetail(orderId) {
      try {
        const res  = await fetch(API + "/order/" + orderId, {
          headers: { Authorization: "Bearer " + token }
        });
        const data = await res.json();

        // Buat isi modal
        let itemsHTML = "";
        data.items.forEach(item => {
          itemsHTML += `
            <div style="
              display:flex;
              justify-content:space-between;
              align-items:center;
              padding:12px 0;
              border-bottom:1px solid var(--border);
            ">
              <div>
                <div style="font-weight:600">${item.nama}</div>
                <div style="font-size:0.82rem; color:var(--text-muted)">
                  ${item.jumlah} pasang × ${formatHarga(item.harga)}
                </div>
              </div>
              <div style="font-weight:700; color:var(--primary)">
                ${formatHarga(item.subtotal)}
              </div>
            </div>`;
        });

        document.getElementById("modalContent").innerHTML = `
          <h3 style="
            font-family:var(--font-display);
            font-size:1.3rem;
            font-weight:800;
            margin-bottom:4px;
          ">Order #${data.order.id}</h3>

          <p style="font-size:0.82rem; color:var(--text-muted); margin-bottom:20px;">
            ${formatTanggal(data.order.created_at)}
          </p>

          ${itemsHTML}

          <div style="
            display:flex;
            justify-content:space-between;
            font-weight:700;
            font-size:1.1rem;
            margin-top:16px;
            padding-top:16px;
          ">
            <span>Total</span>
            <span style="color:var(--primary)">${formatHarga(data.order.total)}</span>
          </div>

          <div style="margin-top:8px; text-align:right;">
            <span class="order-status status-${data.order.status}">
              ${data.order.status}
            </span>
          </div>
        `;

        // Tampilkan modal
        const modal = document.getElementById("modal");
        modal.style.display = "flex";

      } catch (err) {
        console.error(err);
      }
    }

    // ── Tutup Modal ──
    function tutupModal() {
      document.getElementById("modal").style.display = "none";
    }

    // Klik di luar modal → tutup
    document.getElementById("modal").addEventListener("click", function(e) {
      if (e.target === this) tutupModal();
    });

    // ── Logout ──
    function logout() {
      localStorage.removeItem("token");
      localStorage.removeItem("user");
      window.location.href = "login.html";
    }

    // Load pertama
    getOrders();
  </script>

</body>
</html>
