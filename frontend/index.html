<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SepatuKu — Toko Sepatu Online</title>
  <link href="https://fonts.google.com/share?selection.family=Oswald:wght@200..700" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-inner">
      <a class="navbar-logo" href="index.html">👟 SepatuKu</a>
<div class="navbar-menu">
    <a href="index.html">Produk</a>
    <a href="orders.html">Pesanan Saya</a>
    <a id="nav-admin" href="admin.html" style="display:none;">👑 Halaman Admin</a>
</div>
      <div class="navbar-right">
        <span id="nav-username"></span>
        <a class="btn-cart" href="cart.html">🛒 Cart</a>
        <button class="btn-logout" onclick="logout()">Logout</button>
      </div>
    </div>
  </nav>

  <!-- Main -->
  <div class="container">
    <h2 class="page-title">Semua Produk</h2>
    <p class="page-sub">Temukan sepatu favoritmu!</p>

    <!-- Search Bar -->
<div style="margin-bottom:20px;">
  <input
    id="searchInput"
    class="input"
    type="text"
    placeholder="🔍 Cari sepatu..."
    oninput="searchProduk()"
    style="max-width:400px;"
  />
</div>

    <!-- Filter Kategori -->
    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('semua')" id="f-semua">Semua</button>
      <button class="filter-btn" onclick="setFilter('sneakers')" id="f-sneakers">Sneakers</button>
      <button class="filter-btn" onclick="setFilter('casual')" id="f-casual">Casual</button>
      <button class="filter-btn" onclick="setFilter('boots')" id="f-boots">Boots</button>
      <button class="filter-btn" onclick="setFilter('sandal')" id="f-sandal">Sandal</button>
    </div>

    <!-- Grid Produk -->
    <div class="produk-grid" id="produkGrid"></div>
  </div>

  <script>
    const API   = "http://localhost:5000";
    const token = localStorage.getItem("token");
    const user  = JSON.parse(localStorage.getItem("user"));

    // Cek token
    if (!token) window.location.href = "login.html";

    // Tampilkan nama user
    document.getElementById("nav-username").innerText = user ? "Halo, " + user.nama + "!" : "";

    // Tampilkan menu admin kalau role admin
    if (user && user.role === "admin") {
    document.getElementById("nav-admin").style.display = "inline";
}

    let currentFilter = "semua";

    // ── Search Produk ──
async function searchProduk() {
  const keyword = document.getElementById("searchInput").value;

  // Kalau kosong → tampilkan semua
  if (keyword === "") {
    getProduk();
    return;
  }

  try {
    const res  = await fetch(API + "/produk");
    const data = await res.json();

    // Filter by nama di frontend
    const filtered = data.filter(produk =>
      produk.nama.toLowerCase().includes(keyword.toLowerCase())
    );

    const grid = document.getElementById("produkGrid");

    if (filtered.length === 0) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <div class="icon">🔍</div>
          <p>Produk "${keyword}" tidak ditemukan!</p>
        </div>`;
      return;
    }

    grid.innerHTML = "";
    filtered.forEach(produk => {
      grid.innerHTML += `
        <a class="produk-card" href="detail.html?id=${produk.id}">
          <div class="produk-card-img">👟</div>
          <div class="produk-card-body">
            <div class="produk-card-kategori">${produk.kategori}</div>
            <div class="produk-card-nama">${produk.nama}</div>
            <div class="produk-card-harga">${formatHarga(produk.harga)}</div>
            <div class="produk-card-stok">Stok: ${produk.stok} pasang</div>
          </div>
        </a>`;
    });

  } catch (err) {
    showToast("Gagal mencari produk!", "error");
  }
}

    // ── Filter ──
    function setFilter(filter) {
      currentFilter = filter;

      // Update active button
      document.querySelectorAll(".filter-btn").forEach(btn => {
        btn.classList.remove("active");
      });
      document.getElementById("f-" + filter).classList.add("active");

      getProduk();
    }

    // ── Format Harga ──
    function formatHarga(harga) {
      return "Rp " + harga.toLocaleString("id-ID");
    }

    // ── Get Produk ──
    async function getProduk() {
      const grid = document.getElementById("produkGrid");
      grid.innerHTML = "<p style='color:var(--text-muted)'>Memuat produk...</p>";

      try {
        let url = API + "/produk";
        if (currentFilter !== "semua") {
          url = API + "/produk?kategori=" + currentFilter;
        }

        const res  = await fetch(url);
        const data = await res.json();

        if (data.length === 0) {
          grid.innerHTML = `
            <div class="empty-state" style="grid-column:1/-1">
              <div class="icon">👟</div>
              <p>Tidak ada produk di kategori ini.</p>
            </div>`;
          return;
        }

        grid.innerHTML = "";
        data.forEach(produk => {
          grid.innerHTML += `
            <a class="produk-card" href="detail.html?id=${produk.id}">
              <div class="produk-card-img">
    ${produk.gambar
        ? `<img src="${API}/uploads/${produk.gambar}" alt="${produk.nama}"
            onerror="this.parentElement.innerHTML='<span style=font-size:4rem>👟</span>'"
            style="width:100%; height:100%; object-fit:cover;" />`
        : '<span style="font-size:4rem">👟</span>'
    }
</div>
              <div class="produk-card-body">
                <div class="produk-card-kategori">${produk.kategori}</div>
                <div class="produk-card-nama">${produk.nama}</div>
                <div class="produk-card-harga">${formatHarga(produk.harga)}</div>
                <div class="produk-card-stok">Stok: ${produk.stok} pasang</div>
              </div>
            </a>`;
        });

      } catch (err) {
        grid.innerHTML = "<p style='color:var(--danger)'>Gagal memuat produk!</p>";
      }
    }

    // ── Logout ──
    function logout() {
      localStorage.removeItem("token");
      localStorage.removeItem("user");
      window.location.href = "login.html";
    }

    // Load pertama
    getProduk();
  </script>

</body>
</html>
