<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart — SepatuKu</title>
  <link href="https://fonts.google.com/share?selection.family=Oswald:wght@200..700" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-inner">
      <a class="navbar-logo" href="index.html">👟 SepatuKu</a>
      <div class="navbar-menu">
        <a href="index.html">Produk</a>
        <a href="orders.html">Pesanan Saya</a>
      </div>
      <div class="navbar-right">
        <span id="nav-username"></span>
        <a class="btn-cart" href="cart.html">🛒 Cart</a>
        <button class="btn-logout" onclick="logout()">Logout</button>
      </div>
    </div>
  </nav>

  <!-- Main -->
  <div class="container">
    <h2 class="page-title">Keranjang Belanja</h2>
    <p class="page-sub">Cek kembali pesananmu sebelum checkout!</p>

    <div class="cart-wrap">

      <!-- Kiri: List Item Cart -->
      <div id="cartList"></div>

      <!-- Kanan: Summary -->
      <div class="cart-summary">
        <h3>Ringkasan Belanja</h3>

        <div class="summary-row">
          <span>Total Item</span>
          <span id="summary-item">0 item</span>
        </div>

        <div class="summary-total">
          <span>Total Harga</span>
          <span id="summary-total">Rp 0</span>
        </div>

        <button class="btn-primary btn-full" onclick="checkout()">
          Checkout Sekarang
        </button>

        <a href="index.html" class="btn-secondary btn-full"
          style="margin-top:10px; text-align:center; display:block;">
          Lanjut Belanja
        </a>
      </div>

    </div>
  </div>

  <!-- Toast -->
  <div id="toast" style="display:none"></div>

  <script>
    const API   = "http://localhost:5000";
    const token = localStorage.getItem("token");
    const user  = JSON.parse(localStorage.getItem("user"));

    // Cek token
    if (!token) window.location.href = "login.html";

    // Tampilkan nama user
    document.getElementById("nav-username").innerText = user ? "Halo, " + user.nama + "!" : "";

    // ── Format Harga ──
    function formatHarga(harga) {
      return "Rp " + harga.toLocaleString("id-ID");
    }

    // ── Get Cart ──
    async function getCart() {
      try {
        const res  = await fetch(API + "/cart", {
          headers: { Authorization: "Bearer " + token }
        });
        const data = await res.json();

        const cartList = document.getElementById("cartList");

        // Cart kosong
        if (data.cart.length === 0) {
          cartList.innerHTML = `
            <div class="empty-state">
              <div class="icon">🛒</div>
              <p>Cart kamu masih kosong!</p>
              <a href="index.html" class="btn-primary">Mulai Belanja</a>
            </div>`;
          document.getElementById("summary-item").innerText = "0 item";
          document.getElementById("summary-total").innerText = "Rp 0";
          return;
        }

        // Tampilkan item cart
        cartList.innerHTML = "";
        data.cart.forEach(item => {
          cartList.innerHTML += `
            <div class="cart-item">
              <div class="cart-item-img">👟</div>

              <div class="cart-item-info">
                <div class="cart-item-nama">${item.nama}</div>
                <div class="cart-item-harga">${formatHarga(item.harga)} / pasang</div>
                <div class="cart-item-jumlah">
                  <button class="jumlah-btn" onclick="updateJumlah(${item.id}, ${item.jumlah - 1})">−</button>
                  <span>${item.jumlah}</span>
                  <button class="jumlah-btn" onclick="updateJumlah(${item.id}, ${item.jumlah + 1})">+</button>
                </div>
              </div>

              <div>
                <div class="cart-item-subtotal">${formatHarga(item.subtotal)}</div>
                <button class="btn-danger" style="margin-top:8px"
                  onclick="hapusItem(${item.id})">Hapus</button>
              </div>
            </div>`;
        });

        // Update summary
        document.getElementById("summary-item").innerText  = data.cart.length + " item";
        document.getElementById("summary-total").innerText = formatHarga(data.total);

      } catch (err) {
        showToast("Gagal memuat cart!", "error");
      }
    }

    // ── Update Jumlah ──
    async function updateJumlah(cartId, jumlahBaru) {
      // Kalau jumlah 0 → hapus item
      if (jumlahBaru < 1) {
        hapusItem(cartId);
        return;
      }

      try {
        await fetch(API + "/cart/" + cartId, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer " + token
          },
          body: JSON.stringify({ jumlah: jumlahBaru })
        });

        getCart(); // refresh
      } catch (err) {
        showToast("Gagal update jumlah!", "error");
      }
    }

    // ── Hapus Item ──
    async function hapusItem(cartId) {
      try {
        await fetch(API + "/cart/" + cartId, {
          method: "DELETE",
          headers: { Authorization: "Bearer " + token }
        });

        showToast("Item berhasil dihapus!", "success");
        getCart(); // refresh
      } catch (err) {
        showToast("Gagal hapus item!", "error");
      }
    }

    // ── Checkout ──
    async function checkout() {
      try {
        const res  = await fetch(API + "/order/checkout", {
          method: "POST",
          headers: { Authorization: "Bearer " + token }
        });

        const data = await res.json();

        if (res.ok) {
          showToast("Checkout berhasil! 🎉", "success");
          setTimeout(() => {
            window.location.href = "orders.html";
          }, 1500);
        } else {
          showToast(data.message, "error");
        }

      } catch (err) {
        showToast("Server error!", "error");
      }
    }

    // ── Toast ──
    function showToast(message, type = "") {
      const toast = document.getElementById("toast");
      toast.innerText     = message;
      toast.className     = "toast " + type;
      toast.style.display = "block";
      setTimeout(() => { toast.style.display = "none"; }, 3000);
    }

    // ── Logout ──
    function logout() {
      localStorage.removeItem("token");
      localStorage.removeItem("user");
      window.location.href = "login.html";
    }

    // Load pertama
    getCart();
  </script>

</body>
</html>
